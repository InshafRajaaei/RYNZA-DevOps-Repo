---
- name: Configure and Deploy RYNZA App
  hosts: all
  become: yes
  vars:
    # These will be passed from Jenkins
    docker_registry: "inshafrajaaei"
    backend_image_tag: "latest"
    frontend_image_tag: "latest"
    admin_image_tag: "latest"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Docker and Docker Compose (Ensure they exist)
      apt:
        name:
          - docker.io
          - docker-compose
        state: present

    - name: Start and Enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Copy Docker Compose file to server
      copy:
        src: docker-compose.prod.yml
        dest: /home/ubuntu/docker-compose.yml
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Create .env file for the application
      copy:
        dest: /home/ubuntu/.env
        content: |
          MONGODB_URL=mongodb://mongodb:27017/RYNZAdb
          CLOUDINARY_API_KEY=344298332585696
          CLOUDINARY_SECRET_KEY=C1x_yuQrGYNQ29Y6trklRjEBfU8
          CLOUDINARY_NAME=dtif0kosd
          JWT_SECRET=inshafrajaaei
          ADMIN_EMAIL=rynza@gmail.com
          ADMIN_PASSWORD=qwerty2002
          STRIPE_SECRET_KEY=sk_test_51RtNF2DddMly1X34IZTm13I87O7EY0YkvdWgAsxyaKODBAR6o1gz23Zx6nt8sSUQEKnwgglGLin0OXtGmKUB5fqu00PnFItGPH
          PORT=4000
          NODE_ENV=production

    - name: Pull latest Docker images
      command: docker-compose pull
      args:
        chdir: /home/ubuntu

    - name: Start Containers (Deployment)
      command: docker-compose up -d
      args:
        chdir: /home/ubuntu